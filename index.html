<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <meta name="description" content="Mahip Patel — Software Engineer · M.S. Computer Science. Portfolio, resume, and contact." />
  <meta name="theme-color" content="#0A2540" />
  <title>Mahip Patel — Portfolio</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230A2540'/%3E%3Ctext x='50%25' y='50%25' font-family='Georgia, serif' font-size='32' font-weight='700' fill='%23B8915A' dominant-baseline='central' text-anchor='middle'%3EMP%3C/text%3E%3C/svg%3E" />

  <!-- React + Babel from CDN (fine for personal sites; for production you'd bundle) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>html,body{margin:0;background:#FAFAF7}#root{min-height:100vh}</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react" data-type="module">
    const { useState, useEffect } = React;

    const PROFILE_IMAGE = "./profile.jpg";
    const RESUME_PDF = "./Mahip_Resume.pdf";

    const data = {
      name: "Mahip Patel",
      tagline: "Software Engineer · M.S. Computer Science",
      location: "Texas, USA",
      email: "mahiptexas@gmail.com",
      phone: "+1 (512) 665-9294",
      github: "https://github.com/mahip-patel",
      linkedin: "https://www.linkedin.com/in/mahip-patel",
      about:
        "I'm a graduate student in Computer Science at Texas A&M University–Corpus Christi with hands-on experience across full-stack web development, data engineering, and applied AI. I enjoy turning messy problems into clean, well-architected systems — from React-based production websites to RAG-powered campus assistants and IoT irrigation prototypes. I care deeply about reliability, thoughtful UX, and writing software that's a pleasure to maintain.",
      experience: [
        { role: "Graduate Assistant", org: "Texas A&M University–Corpus Christi · Math Learning Center", location: "Corpus Christi, TX", dates: "Jan 2026 – Present",
          bullets: ["Deliver structured academic support and guide students through problem-solving methods across multiple math courses.","Manage tutoring operations, schedules, and documentation, supporting 100+ student interactions efficiently."] },
        { role: "Web Scraping & Web Design (Voluntary)", org: "Texas A&M University–Corpus Christi", location: "Corpus Christi, TX", dates: "Summer 2025",
          bullets: ["Automated data extraction for faculty research by building Python-based web scraping pipelines.","Enhanced internal university webpages through improved layout structure, accessibility, and UI/UX styling."] },
        { role: "Web Developer", org: "Sync Web Solution", location: "Remote", dates: "Aug 2023 – Jul 2024",
          bullets: ["Built a full-stack production website using React.js and MongoDB.","Improved UI responsiveness, backend performance, and security while deploying hosting pipelines."] },
        { role: "Data Management Associate", org: "Bhagwati Hardware", location: "Vadodara, India", dates: "Jan 2022 – Dec 2023",
          bullets: ["Designed SQL/Power BI dashboards for pricing analysis and business reporting to support leadership decisions.","Cleaned and structured operational datasets, improving accuracy, reducing report time, and optimizing data workflows."] },
        { role: "Software Intern", org: "Redspark", location: "Vadodara, India", dates: "Dec 2021 – Jan 2022",
          bullets: ["Developed a PHP-based student management system with secure authentication and course tracking.","Optimized backend logic and SQL queries to reduce database load and improve application performance."] },
      ],
      education: [
        { school: "Texas A&M University–Corpus Christi", degree: "M.S. Computer Science", dates: "Expected May 2026", detail: "GPA: 3.6 / 4.0" },
        { school: "GSFC University, Vadodara", degree: "B.Tech in Computer Science", dates: "May 2024", detail: "CGPA: 7.5 / 10" },
      ],
      skills: [
        { group: "Programming", items: ["Python","Java","JavaScript","PHP",".NET"] },
        { group: "Web / Frontend", items: ["HTML/CSS","React.js","WordPress"] },
        { group: "Data & Analytics", items: ["Power BI","Excel","Tableau","NumPy","Pandas"] },
        { group: "Databases", items: ["MySQL","MongoDB","Redis"] },
        { group: "Cloud / DevOps", items: ["AWS EC2","Docker","Git","GitHub"] },
        { group: "Other", items: ["Graphic Design","Digital Marketing"] },
      ],
      projects: [
        { name: "SmartAssist — AI-Powered Smart Campus Assistant",
          blurb: "An AI-driven campus assistant with a custom RAG pipeline that answers FAQs, automates assignment evaluation feedback, and orchestrates agent-based workflows.",
          tech: ["Python","FastAPI","LLMs","MongoDB","RAG"] },
        { name: "Online Food Ordering System",
          blurb: "Full-stack food ordering platform with secure login, menu management, and real-time order tracking. Tuned database operations for low latency.",
          tech: ["Java","Servlets","JDBC","JSP","HTML/CSS"] },
        { name: "Smart Plan Weather System",
          blurb: "Real-time irrigation monitoring system using soil moisture sensors and microcontrollers; sensor-driven logic improves water efficiency.",
          tech: ["Arduino Nano","NodeMCU","Embedded C","IoT"] },
      ],
    };

    function Section({ id, eyebrow, title, children }) {
      return (
        <section id={id} className="section">
          <div className="container">
            <header className="section__head" data-reveal>
              <p className="eyebrow">{eyebrow}</p>
              <h2 className="section__title">{title}</h2>
              <div className="section__rule" />
            </header>
            {children}
          </div>
        </section>
      );
    }

    function Stat({ number, label }) {
      return (
        <div className="stat">
          <div className="stat__num">{number}</div>
          <div className="stat__label">{label}</div>
        </div>
      );
    }

    function ContactForm({ email }) {
      const [form, setForm] = useState({ name: "", email: "", message: "" });
      const onChange = (e) => setForm({ ...form, [e.target.name]: e.target.value });
      const onSubmit = (e) => {
        e.preventDefault();
        const subject = encodeURIComponent(`Portfolio inquiry from ${form.name || "a visitor"}`);
        const body = encodeURIComponent(`Hi Mahip,\n\n${form.message}\n\n— ${form.name}\n${form.email}`);
        window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
      };
      return (
        <form className="contact__form" onSubmit={onSubmit} data-reveal>
          <label><span>Name</span><input name="name" required value={form.name} onChange={onChange} placeholder="Your name" /></label>
          <label><span>Email</span><input name="email" type="email" required value={form.email} onChange={onChange} placeholder="you@example.com" /></label>
          <label><span>Message</span><textarea name="message" required rows={5} value={form.message} onChange={onChange} placeholder="What's on your mind?" /></label>
          <button type="submit" className="btn btn--primary">Send message</button>
        </form>
      );
    }

    function Portfolio() {
      const [navOpen, setNavOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);
      const [showTop, setShowTop] = useState(false);

      useEffect(() => {
        const onScroll = () => { setScrolled(window.scrollY > 40); setShowTop(window.scrollY > 600); };
        window.addEventListener("scroll", onScroll);
        return () => window.removeEventListener("scroll", onScroll);
      }, []);

      useEffect(() => {
        const els = document.querySelectorAll("[data-reveal]");
        const io = new IntersectionObserver((entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) { e.target.classList.add("is-visible"); io.unobserve(e.target); }
          });
        }, { threshold: 0.12 });
        els.forEach((el) => io.observe(el));
        return () => io.disconnect();
      }, []);

      const scrollTo = (id) => {
        setNavOpen(false);
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      };

      return (
        <div className="portfolio-root">
          <header className={`nav ${scrolled ? "nav--scrolled" : ""}`}>
            <div className="nav__inner">
              <a className="nav__brand" onClick={() => scrollTo("home")}>
                <span className="nav__monogram">MP</span>
                <span className="nav__name">Mahip Patel</span>
              </a>
              <nav className={`nav__links ${navOpen ? "is-open" : ""}`}>
                {["about","experience","education","skills","projects","contact"].map((s) => (
                  <a key={s} onClick={() => scrollTo(s)}>{s.charAt(0).toUpperCase() + s.slice(1)}</a>
                ))}
                <a className="nav__cta" href={RESUME_PDF} target="_blank" rel="noreferrer">Resume ↗</a>
              </nav>
              <button className={`nav__toggle ${navOpen ? "is-open" : ""}`} aria-label="Toggle menu" onClick={() => setNavOpen((o) => !o)}>
                <span></span><span></span><span></span>
              </button>
            </div>
          </header>

          <section id="home" className="hero">
            <div className="hero__bg" aria-hidden="true"></div>
            <div className="container hero__inner">
              <div className="hero__copy" data-reveal>
                <p className="eyebrow">Portfolio · {new Date().getFullYear()}</p>
                <h1 className="hero__title">Hi, I'm <span className="accent">Mahip</span>.</h1>
                <p className="hero__tagline">{data.tagline}</p>
                <p className="hero__sub">Building thoughtful software at the intersection of full-stack engineering, data, and applied AI.</p>
                <div className="hero__cta">
                  <button className="btn btn--primary" onClick={() => scrollTo("contact")}>Get in touch</button>
                  <a className="btn btn--ghost" href={RESUME_PDF} target="_blank" rel="noreferrer">View résumé</a>
                </div>
                <div className="hero__meta"><span>📍 {data.location}</span><span>✉ {data.email}</span></div>
              </div>
              <div className="hero__photo" data-reveal>
                <div className="photo-frame">
                  <img src={PROFILE_IMAGE} alt="Mahip Patel" onError={(e) => { e.currentTarget.style.display = "none"; e.currentTarget.parentNode.classList.add("photo-frame--fallback"); }} />
                  <div className="photo-frame__fallback">MP</div>
                </div>
              </div>
            </div>
          </section>

          <Section id="about" eyebrow="01 — About" title="A bit about me">
            <div className="about" data-reveal>
              <p className="about__text">{data.about}</p>
              <div className="about__stats">
                <Stat number="5+" label="Roles & internships" />
                <Stat number="3" label="Featured projects" />
                <Stat number="6+" label="Tech stacks" />
              </div>
            </div>
          </Section>

          <Section id="experience" eyebrow="02 — Experience" title="Where I've worked">
            <ol className="timeline">
              {data.experience.map((e, i) => (
                <li key={i} className="timeline__item" data-reveal>
                  <div className="timeline__dot" />
                  <div className="timeline__card">
                    <div className="timeline__head">
                      <h3>{e.role}</h3>
                      <span className="timeline__dates">{e.dates}</span>
                    </div>
                    <p className="timeline__org">{e.org} <span className="dot">•</span> <em>{e.location}</em></p>
                    <ul className="timeline__bullets">{e.bullets.map((b, j) => <li key={j}>{b}</li>)}</ul>
                  </div>
                </li>
              ))}
            </ol>
          </Section>

          <Section id="education" eyebrow="03 — Education" title="Academic background">
            <div className="grid grid--2">
              {data.education.map((ed, i) => (
                <div key={i} className="card education-card" data-reveal>
                  <h3>{ed.school}</h3>
                  <p className="education-card__degree">{ed.degree}</p>
                  <div className="education-card__meta"><span>{ed.dates}</span><span className="pill pill--gold">{ed.detail}</span></div>
                </div>
              ))}
            </div>
          </Section>

          <Section id="skills" eyebrow="04 — Skills" title="Tools of the trade">
            <div className="skills">
              {data.skills.map((g, i) => (
                <div key={i} className="skills__group" data-reveal>
                  <h4>{g.group}</h4>
                  <div className="skills__chips">{g.items.map((s) => <span key={s} className="chip">{s}</span>)}</div>
                </div>
              ))}
            </div>
          </Section>

          <Section id="projects" eyebrow="05 — Projects" title="Selected work">
            <div className="grid grid--3">
              {data.projects.map((p, i) => (
                <article key={i} className="card project" data-reveal>
                  <div className="project__num">0{i + 1}</div>
                  <h3>{p.name}</h3>
                  <p>{p.blurb}</p>
                  <div className="project__tech">{p.tech.map((t) => <span key={t} className="chip chip--ghost">{t}</span>)}</div>
                </article>
              ))}
            </div>
          </Section>

          <Section id="contact" eyebrow="06 — Contact" title="Let's talk">
            <div className="contact">
              <div className="contact__info" data-reveal>
                <p className="contact__lead">I'm always open to interesting opportunities, collaborations, or just a good conversation about software and design. Drop me a line.</p>
                <ul className="contact__list">
                  <li><span className="contact__label">Email</span><a href={`mailto:${data.email}`}>{data.email}</a></li>
                  <li><span className="contact__label">Phone</span><a href={`tel:${data.phone.replace(/\s|\(|\)|-/g, "")}`}>{data.phone}</a></li>
                  <li><span className="contact__label">Location</span><span>{data.location}</span></li>
                  <li><span className="contact__label">LinkedIn</span><a href={data.linkedin} target="_blank" rel="noreferrer">linkedin.com/in/mahip-patel</a></li>
                  <li><span className="contact__label">GitHub</span><a href={data.github} target="_blank" rel="noreferrer">github.com/mahip-patel</a></li>
                </ul>
              </div>
              <ContactForm email={data.email} />
            </div>
          </Section>

          <footer className="footer">
            <div className="container footer__inner">
              <p>© {new Date().getFullYear()} Mahip Patel. Crafted with care.</p>
              <div className="footer__links">
                <a href={data.linkedin} target="_blank" rel="noreferrer">LinkedIn</a>
                <a href={data.github} target="_blank" rel="noreferrer">GitHub</a>
                <a href={`mailto:${data.email}`}>Email</a>
              </div>
            </div>
          </footer>

          <button className={`back-top ${showTop ? "is-visible" : ""}`} onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })} aria-label="Back to top">↑</button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Portfolio />);
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --navy: #0A2540; --navy-dark: #061a30; --navy-light: #1E3A5F;
      --gold: #B8915A; --gold-soft: #d9b889;
      --slate: #4A5568; --slate-light: #6B7280;
      --bg: #FAFAF7; --bg-alt: #F3F1EC; --white: #fff; --border: #E5E1D8;
      --shadow-sm: 0 1px 2px rgba(10,37,64,0.06);
      --shadow-md: 0 8px 24px rgba(10,37,64,0.08);
      --shadow-lg: 0 20px 48px rgba(10,37,64,0.12);
      --radius: 14px;
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'Inter', system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; }
    .portfolio-root { font-family: var(--sans); color: var(--navy); background: var(--bg); line-height: 1.65; -webkit-font-smoothing: antialiased; }
    .container { width: 100%; max-width: 1140px; margin: 0 auto; padding: 0 24px; }

    [data-reveal] { opacity: 0; transform: translateY(18px); transition: opacity .8s ease, transform .8s ease; }
    [data-reveal].is-visible { opacity: 1; transform: translateY(0); }

    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: rgba(250,250,247,.7); backdrop-filter: saturate(180%) blur(12px); -webkit-backdrop-filter: saturate(180%) blur(12px); transition: box-shadow .3s, background .3s; }
    .nav--scrolled { background: rgba(250,250,247,.92); box-shadow: var(--shadow-sm); }
    .nav__inner { max-width: 1140px; margin: 0 auto; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .nav__brand { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
    .nav__monogram { width: 36px; height: 36px; border-radius: 8px; background: var(--navy); color: var(--gold-soft); font-family: var(--serif); font-weight: 700; display: flex; align-items: center; justify-content: center; letter-spacing: .5px; }
    .nav__name { font-family: var(--serif); font-weight: 600; font-size: 17px; }
    .nav__links { display: flex; align-items: center; gap: 28px; }
    .nav__links a { cursor: pointer; color: var(--slate); font-size: 14.5px; font-weight: 500; letter-spacing: .2px; position: relative; text-decoration: none; transition: color .2s; }
    .nav__links a:hover { color: var(--navy); }
    .nav__links a:not(.nav__cta)::after { content: ''; position: absolute; left: 0; bottom: -6px; width: 0; height: 2px; background: var(--gold); transition: width .25s; }
    .nav__links a:not(.nav__cta):hover::after { width: 100%; }
    .nav__cta { background: var(--navy); color: var(--white) !important; padding: 9px 16px; border-radius: 999px; font-weight: 600 !important; }
    .nav__cta:hover { background: var(--navy-light); }
    .nav__toggle { display: none; background: none; border: none; cursor: pointer; padding: 8px; }
    .nav__toggle span { display: block; width: 24px; height: 2px; background: var(--navy); margin: 5px 0; transition: transform .25s, opacity .2s; }
    .nav__toggle.is-open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav__toggle.is-open span:nth-child(2) { opacity: 0; }
    .nav__toggle.is-open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .hero { position: relative; padding: 140px 0 90px; overflow: hidden; }
    .hero__bg { position: absolute; inset: 0; background: radial-gradient(900px 480px at 85% -10%, rgba(184,145,90,.18), transparent 60%), radial-gradient(700px 420px at 0% 100%, rgba(10,37,64,.08), transparent 60%); pointer-events: none; }
    .hero__inner { display: grid; grid-template-columns: 1.1fr .9fr; gap: 64px; align-items: center; position: relative; }
    .eyebrow { font-size: 12.5px; letter-spacing: .25em; text-transform: uppercase; color: var(--gold); font-weight: 600; margin: 0 0 14px; }
    .hero__title { font-family: var(--serif); font-size: clamp(2.4rem, 5.4vw, 4.2rem); line-height: 1.05; margin: 0 0 14px; letter-spacing: -.5px; }
    .accent { color: var(--gold); font-style: italic; }
    .hero__tagline { font-family: var(--serif); font-size: clamp(1.05rem, 2vw, 1.35rem); color: var(--navy-light); margin: 0 0 18px; font-weight: 500; }
    .hero__sub { color: var(--slate); font-size: 1.05rem; max-width: 520px; margin: 0 0 28px; }
    .hero__cta { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 28px; }
    .hero__meta { display: flex; flex-wrap: wrap; gap: 22px; color: var(--slate); font-size: 14.5px; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 13px 24px; border-radius: 999px; font-weight: 600; font-size: 14.5px; cursor: pointer; text-decoration: none; transition: all .25s; border: 1.5px solid transparent; font-family: inherit; }
    .btn--primary { background: var(--navy); color: var(--white); border-color: var(--navy); }
    .btn--primary:hover { background: var(--navy-light); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .btn--ghost { background: transparent; color: var(--navy); border-color: var(--navy); }
    .btn--ghost:hover { background: var(--navy); color: var(--white); transform: translateY(-2px); }

    .hero__photo { display: flex; justify-content: center; }
    .photo-frame { position: relative; width: min(360px, 80vw); aspect-ratio: 4/5; border-radius: 18px; overflow: hidden; background: var(--navy); box-shadow: var(--shadow-lg); transform: rotate(2deg); transition: transform .5s; }
    .photo-frame::before { content: ""; position: absolute; inset: -10px; border: 2px solid var(--gold); border-radius: 22px; z-index: -1; transform: rotate(-4deg); opacity: .7; }
    .photo-frame:hover { transform: rotate(0) scale(1.02); }
    .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-frame__fallback { display: none; position: absolute; inset: 0; font-family: var(--serif); font-size: 5rem; color: var(--gold-soft); align-items: center; justify-content: center; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); }
    .photo-frame--fallback .photo-frame__fallback { display: flex; }

    .section { padding: 90px 0; }
    .section:nth-of-type(even) { background: var(--bg-alt); }
    .section__head { margin-bottom: 48px; }
    .section__title { font-family: var(--serif); font-size: clamp(1.9rem, 3.6vw, 2.6rem); margin: 0 0 14px; letter-spacing: -.3px; }
    .section__rule { width: 56px; height: 3px; background: var(--gold); border-radius: 2px; }

    .about { display: grid; grid-template-columns: 1.4fr 1fr; gap: 56px; align-items: center; }
    .about__text { font-size: 1.08rem; color: var(--slate); line-height: 1.85; margin: 0; }
    .about__stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .stat { background: var(--white); padding: 22px 16px; border-radius: var(--radius); text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
    .stat__num { font-family: var(--serif); font-size: 2rem; color: var(--navy); font-weight: 700; line-height: 1; }
    .stat__label { font-size: 12.5px; color: var(--slate-light); margin-top: 6px; letter-spacing: .03em; }

    .timeline { list-style: none; margin: 0; padding: 0; position: relative; }
    .timeline::before { content: ''; position: absolute; left: 14px; top: 8px; bottom: 8px; width: 2px; background: var(--border); }
    .timeline__item { position: relative; padding-left: 50px; margin-bottom: 36px; }
    .timeline__item:last-child { margin-bottom: 0; }
    .timeline__dot { position: absolute; left: 7px; top: 18px; width: 16px; height: 16px; border-radius: 50%; background: var(--gold); border: 3px solid var(--bg); box-shadow: 0 0 0 2px var(--gold); }
    .section:nth-of-type(even) .timeline__dot { border-color: var(--bg-alt); }
    .timeline__card { background: var(--white); padding: 24px 26px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm); transition: transform .25s, box-shadow .25s; }
    .timeline__card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .timeline__head { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 12px; align-items: baseline; margin-bottom: 4px; }
    .timeline__head h3 { font-family: var(--serif); font-size: 1.2rem; margin: 0; color: var(--navy); }
    .timeline__dates { font-size: 13px; color: var(--slate-light); font-weight: 500; white-space: nowrap; }
    .timeline__org { color: var(--gold); font-weight: 600; font-size: 14.5px; margin: 0 0 10px; }
    .timeline__org em { color: var(--slate-light); font-weight: 400; font-style: normal; }
    .dot { color: var(--border); margin: 0 4px; }
    .timeline__bullets { margin: 0; padding-left: 20px; color: var(--slate); }
    .timeline__bullets li { margin-bottom: 6px; }
    .timeline__bullets li::marker { color: var(--gold); }

    .grid { display: grid; gap: 24px; }
    .grid--2 { grid-template-columns: repeat(2, 1fr); }
    .grid--3 { grid-template-columns: repeat(3, 1fr); }
    .card { background: var(--white); padding: 28px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm); transition: transform .25s, box-shadow .25s; }
    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }

    .education-card h3 { font-family: var(--serif); font-size: 1.25rem; margin: 0 0 6px; }
    .education-card__degree { color: var(--gold); font-weight: 600; margin: 0 0 14px; }
    .education-card__meta { display: flex; justify-content: space-between; align-items: center; color: var(--slate-light); font-size: 14px; }
    .pill { display: inline-block; padding: 4px 12px; border-radius: 999px; font-size: 12.5px; font-weight: 600; letter-spacing: .02em; }
    .pill--gold { background: rgba(184,145,90,.12); color: var(--gold); }

    .skills { display: grid; grid-template-columns: repeat(2, 1fr); gap: 28px; }
    .skills__group h4 { font-family: var(--serif); font-size: 1.05rem; margin: 0 0 14px; color: var(--navy); display: flex; align-items: center; gap: 10px; }
    .skills__group h4::before { content: ''; width: 14px; height: 2px; background: var(--gold); }
    .skills__chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { background: var(--white); border: 1px solid var(--border); color: var(--navy); padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 500; transition: all .2s; }
    .chip:hover { background: var(--navy); color: var(--white); border-color: var(--navy); }
    .chip--ghost { background: rgba(10,37,64,.04); border-color: transparent; font-size: 12.5px; }

    .project { position: relative; display: flex; flex-direction: column; }
    .project__num { font-family: var(--serif); font-size: 1.4rem; color: var(--gold); font-weight: 600; margin-bottom: 12px; }
    .project h3 { font-family: var(--serif); font-size: 1.2rem; margin: 0 0 12px; line-height: 1.3; }
    .project p { color: var(--slate); margin: 0 0 18px; flex: 1; }
    .project__tech { display: flex; flex-wrap: wrap; gap: 6px; }

    .contact { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: start; }
    .contact__lead { font-family: var(--serif); font-size: 1.15rem; color: var(--navy); margin: 0 0 28px; line-height: 1.55; }
    .contact__list { list-style: none; margin: 0; padding: 0; }
    .contact__list li { display: grid; grid-template-columns: 110px 1fr; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--border); font-size: 15px; }
    .contact__list li:last-child { border-bottom: none; }
    .contact__label { text-transform: uppercase; font-size: 11.5px; letter-spacing: .15em; color: var(--slate-light); font-weight: 600; align-self: center; }
    .contact__list a { color: var(--navy); text-decoration: none; font-weight: 500; transition: color .2s; }
    .contact__list a:hover { color: var(--gold); }
    .contact__form { background: var(--white); padding: 32px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 18px; }
    .contact__form label { display: flex; flex-direction: column; gap: 6px; }
    .contact__form span { font-size: 12.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--slate-light); }
    .contact__form input, .contact__form textarea { font-family: inherit; font-size: 15px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--navy); transition: border-color .2s, box-shadow .2s; resize: vertical; }
    .contact__form input:focus, .contact__form textarea:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(10,37,64,.08); }
    .contact__form .btn { align-self: flex-start; }

    .footer { background: var(--navy); color: rgba(255,255,255,.78); padding: 28px 0; }
    .footer__inner { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 14px; font-size: 14px; }
    .footer__links { display: flex; gap: 22px; }
    .footer__links a { color: rgba(255,255,255,.78); text-decoration: none; transition: color .2s; }
    .footer__links a:hover { color: var(--gold-soft); }

    .back-top { position: fixed; right: 24px; bottom: 24px; width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--navy); color: var(--white); font-size: 20px; cursor: pointer; box-shadow: var(--shadow-md); opacity: 0; transform: translateY(12px); pointer-events: none; transition: opacity .25s, transform .25s, background .2s; z-index: 40; }
    .back-top.is-visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .back-top:hover { background: var(--gold); }

    @media (max-width: 900px) {
      .hero { padding: 120px 0 70px; }
      .hero__inner { grid-template-columns: 1fr; gap: 40px; }
      .hero__photo { order: -1; }
      .photo-frame { width: min(280px, 70vw); }
      .about { grid-template-columns: 1fr; gap: 32px; }
      .grid--2, .grid--3 { grid-template-columns: 1fr; }
      .skills { grid-template-columns: 1fr; }
      .contact { grid-template-columns: 1fr; gap: 36px; }
      .section { padding: 70px 0; }
      .nav__toggle { display: block; }
      .nav__links { position: absolute; top: 100%; left: 0; right: 0; background: var(--white); flex-direction: column; align-items: stretch; gap: 0; padding: 12px 24px 20px; box-shadow: var(--shadow-md); transform: translateY(-12px); opacity: 0; pointer-events: none; transition: all .25s; }
      .nav__links.is-open { transform: translateY(0); opacity: 1; pointer-events: auto; }
      .nav__links a { padding: 14px 0; border-bottom: 1px solid var(--border); }
      .nav__links a:last-child { border-bottom: none; }
      .nav__cta { text-align: center; margin-top: 8px; }
    }
    @media (max-width: 520px) {
      .container { padding: 0 18px; }
      .nav__inner { padding: 12px 18px; }
      .nav__name { display: none; }
      .timeline__head { flex-direction: column; align-items: flex-start; gap: 4px; }
      .contact__list li { grid-template-columns: 1fr; gap: 4px; }
      .about__stats { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .stat { padding: 14px 8px; }
      .stat__num { font-size: 1.5rem; }
      .hero__cta { flex-direction: column; align-items: stretch; }
      .btn { width: 100%; }
    }
  </style>
</body>
</html>
